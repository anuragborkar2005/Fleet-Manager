networks:
  monitoring:
    driver: bridge

services:
  fleet-backend:
    image: fleet-backend:latest
    build:
      context: ./fleet-backend
    ports:
      - "8080:8080"
    volumes:
      - ./fleet-backend/config.json:/app/config.json
    environment:
      - NODE_ENV=production
    networks:
      - monitoring

  fleet-ui:
    image: fleet-ui:latest
    build:
      context: ./fleet-ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - fleet-backend
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - fleet-backend
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
    networks:
      - monitoring
